<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Spending Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; }

body {
  width: 100%;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  overflow: hidden;
  transition: background 0.3s;
}

body.light {
  background: radial-gradient(120% 80% at 50% 0%, #efece6 0%, #e7e3dc 100%);
  color: #2b2733;
}

body.dark {
  background: radial-gradient(120% 80% at 50% 0%, #1a1820 0%, #0f0d14 100%);
  color: #e8e4ee;
}

#app-frame { position: relative; width: 100%; height: 100%; overflow: hidden; }

.bg-gradient {
  position: absolute;
  inset: 0;
  z-index: 0;
  transition: background 0.3s;
}

body.light .bg-gradient {
  background:
    radial-gradient(120% 90% at 12% 6%, rgba(255,154,139,0.5) 0%, rgba(255,154,139,0) 46%),
    radial-gradient(110% 80% at 92% 16%, rgba(254,207,106,0.4) 0%, rgba(254,207,106,0) 42%),
    radial-gradient(125% 95% at 85% 100%, rgba(161,227,255,0.58) 0%, rgba(161,227,255,0) 52%),
    radial-gradient(100% 80% at 6% 96%, rgba(255,195,160,0.4) 0%, rgba(255,195,160,0) 48%),
    linear-gradient(180deg, #fdf4ef 0%, #fbf0f4 42%, #eef6fb 100%);
}

body.dark .bg-gradient {
  background:
    radial-gradient(120% 90% at 12% 6%, rgba(255,154,139,0.15) 0%, rgba(255,154,139,0) 46%),
    radial-gradient(110% 80% at 92% 16%, rgba(254,207,106,0.12) 0%, rgba(254,207,106,0) 42%),
    radial-gradient(125% 95% at 85% 100%, rgba(161,227,255,0.18) 0%, rgba(161,227,255,0) 52%),
    linear-gradient(180deg, #1a1820 0%, #1f1928 42%, #14121a 100%);
}

.bg-grid {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: 28px 28px;
}

body.light .bg-grid {
  background-image:
    linear-gradient(rgba(120,108,124,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,108,124,0.045) 1px, transparent 1px);
}

body.dark .bg-grid {
  background-image:
    linear-gradient(rgba(200,180,220,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,180,220,0.03) 1px, transparent 1px);
}

.panel {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 16px 120px;
  scrollbar-width: none;
}
.panel::-webkit-scrollbar { width: 0; }

body.light {
  --heading: #2b2733;
  --text: #4a4453;
  --muted: #a79fb0;
  --glass-bg: rgba(255,255,255,0.5);
  --glass-border: rgba(255,255,255,0.7);
  --card-bg: rgba(255,255,255,0.55);
  --input-bg: rgba(255,255,255,0.8);
  --input-border: rgba(200,190,200,0.6);
  --accent: #f07b66;
}

body.dark {
  --heading: #e8e4ee;
  --text: #b8b0c0;
  --muted: #7a7286;
  --glass-bg: rgba(40,35,52,0.5);
  --glass-border: rgba(80,72,92,0.6);
  --card-bg: rgba(45,40,58,0.55);
  --input-bg: rgba(45,40,58,0.8);
  --input-border: rgba(80,72,92,0.6);
  --accent: #ff9a8b;
}

/* Google Sans for all numbers */
.num {
  font-family: 'Google Sans', 'Product Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-feature-settings: 'tnum' 1;
  letter-spacing: -0.3px;
}

.metric-card {
  padding: 18px;
  border-radius: 22px;
  backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid var(--glass-border);
  box-shadow: 0 16px 40px -26px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}

.metric-label {
  font-size: 10px;
  letter-spacing: 0.9px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

.metric-value {
  margin-top: 6px;
  font-weight: 600;
  font-size: 26px;
  color: var(--heading);
}

#tab-bar {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 5;
  padding: 10px 16px 16px;
}

.tab-bar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-radius: 28px;
  background: var(--glass-bg);
  backdrop-filter: blur(22px) saturate(1.4);
  border: 1px solid var(--glass-border);
  box-shadow: 0 18px 44px -20px rgba(0,0,0,0.4);
}

.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 4px 0;
  color: var(--muted);
}
.tab-btn.active { color: var(--accent); }
.tab-btn span { font-size: 9.5px; font-weight: 700; }

.tab-orb-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  border: none;
  background: transparent;
  cursor: pointer;
  transform: translateY(-2px);
}

.tab-orb {
  width: 50px; height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(52% 52% at 32% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0) 46%),
    radial-gradient(70% 70% at 72% 70%, rgba(161,227,255,0.95), rgba(161,227,255,0) 60%),
    radial-gradient(70% 70% at 28% 80%, rgba(254,207,106,0.8), rgba(254,207,106,0) 60%),
    radial-gradient(100% 100% at 50% 50%, #ff9a8b, #e9c6ff);
  box-shadow: 0 14px 28px -10px rgba(255,150,140,0.8), inset 0 2px 6px rgba(255,255,255,0.6);
}

#toast {
  position: fixed;
  left: 50%; bottom: 110px;
  transform: translateX(-50%) translateY(12px);
  z-index: 100;
  padding: 11px 20px;
  border-radius: 22px;
  background: rgba(43,39,51,0.95);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 18px 40px -16px rgba(0,0,0,0.6);
  transition: opacity 0.3s, transform 0.3s;
  opacity: 0;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  padding: 20px;
  overflow-y: auto;
}
.modal.open { display: flex; align-items: flex-end; justify-content: center; }

.modal-content {
  background: var(--card-bg);
  backdrop-filter: blur(20px) saturate(1.3);
  border-radius: 28px;
  padding: 24px;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid var(--glass-border);
}
body.light .modal-content { background: rgba(255,255,255,0.95); }
body.dark .modal-content { background: rgba(35,30,42,0.95); }

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-header h2 {
  margin: 0;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 600;
  font-size: 24px;
  color: var(--heading);
}
.modal-close {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--muted);
}

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

input[type="text"],
input[type="number"],
input[type="date"],
select, textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--input-border);
  border-radius: 14px;
  font-size: 14px;
  background: var(--input-bg);
  color: var(--heading);
  font-family: inherit;
  display: block;
}

input[type="number"] {
  font-family: 'Google Sans', 'Product Sans', system-ui, sans-serif;
}

input[type="date"] { -webkit-appearance: none; appearance: none; }

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #ff9a8b;
  box-shadow: 0 0 0 3px rgba(255,154,139,0.15);
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #ff9a8b, #ffc3a0);
  color: white;
  border: none;
  border-radius: 16px;
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
  box-shadow: 0 8px 20px -8px rgba(255,140,120,0.8);
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 12px 0;
}

.cat-btn {
  padding: 12px;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  border-radius: 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--heading);
  text-align: center;
}

.cat-btn.selected {
  background: linear-gradient(135deg, #ff9a8b, #ffc3a0);
  color: white;
  border-color: transparent;
}

.toggle-pair {
  display: flex;
  gap: 10px;
}
.toggle-pair .cat-btn { flex: 1; margin: 0; }

.chart-container {
  position: relative;
  height: 240px;
  margin: 16px 0;
}

.eye-toggle, .theme-toggle {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  padding: 6px;
  color: var(--text);
}

.theme-toggle {
  font-size: 22px;
  padding: 8px;
  border-radius: 12px;
  background: var(--card-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(14px);
}

.collapsible-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}

.chevron {
  transition: transform 0.2s;
  font-size: 12px;
  color: var(--muted);
}
.chevron.open { transform: rotate(90deg); }

/* Credit card visual */
.cc-card {
  position: relative;
  padding: 16px;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  color: white;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.cc-amex { background: linear-gradient(135deg, #2e5cb8 0%, #1a3a73 100%); box-shadow: 0 12px 28px -10px rgba(46,92,184,0.6); }
.cc-master { background: linear-gradient(135deg, #f07b66 0%, #c44d44 100%); box-shadow: 0 12px 28px -10px rgba(240,123,102,0.6); }
.cc-jcb { background: linear-gradient(135deg, #3d8b5e 0%, #2a6543 100%); box-shadow: 0 12px 28px -10px rgba(61,139,94,0.6); }

.cc-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.tx-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-top: 1px solid var(--glass-border);
  font-size: 13px;
}
.tx-row:first-child { border-top: none; }

.tx-meta {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

.split-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 9px;
  font-weight: 700;
  margin-left: 6px;
  background: rgba(255,154,139,0.15);
  color: #c44d44;
}
</style>
</head>
<body class="light">

<div id="app-frame">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div id="panel-home" class="panel"></div>
  <div id="panel-finsights" class="panel" style="display:none"></div>
  <div id="panel-expenses" class="panel" style="display:none"></div>
  <div id="panel-subs" class="panel" style="display:none"></div>

  <div id="tab-bar">
    <div class="tab-bar-inner">
      <button class="tab-btn active" id="tab-home" onclick="goTab('home')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h5v-6h4v6h5V9.5"/></svg>
        <span>Home</span>
      </button>
      <button class="tab-btn" id="tab-finsights" onclick="goTab('finsights')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V11M9.5 20V5M15 20v-6M20.5 20v-9"/></svg>
        <span>Finsights</span>
      </button>
      <button class="tab-orb-btn" onclick="openModal('addTx')">
        <div class="tab-orb">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      </button>
      <button class="tab-btn" id="tab-expenses" onclick="goTab('expenses')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        <span>Expenses</span>
      </button>
      <button class="tab-btn" id="tab-subs" onclick="goTab('subs')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0115.5-6.2M21 12a9 9 0 01-15.5 6.2"/><path d="M18 4v3.8h-3.8M6 20v-3.8h3.8"/></svg>
        <span>Subs</span>
      </button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<!-- ADD TRANSACTION MODAL -->
<div id="modal-addTx" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Log Expense</h2>
      <button class="modal-close" onclick="closeModal('addTx')">×</button>
    </div>
    <form onsubmit="saveTransaction(event)">
      <div class="form-group">
        <label>Category</label>
        <div class="category-grid" id="catGrid"></div>
        <input type="hidden" id="txCat" value="Food">
      </div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="txName" placeholder="e.g. Lunch with friends" required>
      </div>

      <div class="form-group">
        <label>Total Amount (₱)</label>
        <input type="number" id="txTotal" placeholder="0" step="0.01" required oninput="syncShare()">
      </div>

      <div class="form-group">
        <label>Type</label>
        <div class="toggle-pair">
          <button type="button" class="cat-btn selected" data-type="personal" onclick="setSplitType('personal', this)">Personal</button>
          <button type="button" class="cat-btn" data-type="group" onclick="setSplitType('group', this)">Group Payment</button>
        </div>
        <input type="hidden" id="txSplitType" value="personal">
      </div>

      <div class="form-group" id="shareGroup" style="display:none;">
        <label>My Share (₱)</label>
        <input type="number" id="txShare" placeholder="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Paid With</label>
        <div class="category-grid" id="cardGrid"></div>
        <input type="hidden" id="txCard" value="cash">
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="txDate" required>
      </div>

      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="txNotes" rows="2" placeholder="..."></textarea>
      </div>

      <button type="submit" class="submit-btn">Log Expense</button>
    </form>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div id="modal-addCat" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Add Category</h2>
      <button class="modal-close" onclick="closeModal('addCat')">×</button>
    </div>
    <form onsubmit="saveCategory(event)">
      <div class="form-group">
        <label>Pick an Emoji</label>
        <div class="category-grid" id="emojiGrid"></div>
        <input type="hidden" id="catEmoji" value="🎯">
      </div>
      <div class="form-group">
        <label>Category Name</label>
        <input type="text" id="catName" placeholder="e.g. Pets, Gifts, Travel" required>
      </div>
      <button type="submit" class="submit-btn">Add Category</button>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ────────────────────────────────────────────────────────────────────────────
// DATA & STATE
// ────────────────────────────────────────────────────────────────────────────

let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let biWeeklyBudget = parseFloat(localStorage.getItem('biWeeklyBudget')) || 7500;
let customCategories = JSON.parse(localStorage.getItem('customCategories')) || [];
let cardCutoffs = JSON.parse(localStorage.getItem('cardCutoffs')) || {}; // { cardId: lastResetDate }
let theme = localStorage.getItem('theme') || 'light';

const CREDIT_LIMIT = 280000;

const CARDS = [
  { id: 'amex', name: 'AMEX', dueDay: 28, class: 'cc-amex' },
  { id: 'master', name: 'Mastercard', dueDay: 4, class: 'cc-master' },
  { id: 'jcb', name: 'JCB', dueDay: 6, class: 'cc-jcb' },
];

let state = {
  tab: 'home',
  damageHidden: false,
  expandedCard: null,
  expandedMonths: {},
  selectedFinsightsMonth: null,
};

let chartCache = {};
let toastTimer = null;

const DEFAULT_CATEGORIES = [
  { name: 'Food', emoji: '🍔' },
  { name: 'Brain Juice', emoji: '☕' },
  { name: 'Transportation', emoji: '🏎️' },
  { name: 'Personal Care', emoji: '🧴' },
  { name: 'Clothing', emoji: '👕' },
  { name: 'Bills', emoji: '📄' },
  { name: 'Subscription', emoji: '🔄' },
];

const EMOJI_OPTIONS = ['🎯', '🎁', '🐾', '✈️', '📚', '🎮', '💊', '🏠', '🛒', '🍿', '💄', '🎵', '⚽', '🌸'];

const TILE_COLORS = ['#ff9a8b', '#ffc3a0', '#fecf6a', '#b8f3e6', '#a1e3ff', '#e8d4ff', '#ffb3d9', '#c4f0c5'];

function getCategories() {
  return [...DEFAULT_CATEGORIES, ...customCategories];
}

function getCategoryEmoji(name) {
  const cat = getCategories().find(c => c.name === name);
  return cat ? cat.emoji : '💰';
}

function fmt(n) { return '₱' + Math.abs(Math.round(n)).toLocaleString('en-US'); }
function fmtK(n) {
  n = Math.abs(Math.round(n));
  if (n >= 1000) return '₱' + (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'k';
  return '₱' + n;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ────────────────────────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────────────────────────

function getCurrentCycle() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const day = now.getDate();
  let start, end;
  if (day <= 15) {
    start = new Date(year, month, 1);
    end = new Date(year, month, 15);
  } else {
    start = new Date(year, month, 16);
    end = new Date(year, month + 1, 0);
  }
  return { start, end };
}

// Use myShare for personal expense tracking
function getCurrentCycleExpenses() {
  const { start, end } = getCurrentCycle();
  return transactions
    .filter(t => {
      const d = new Date(t.date + 'T00:00:00');
      return d >= start && d <= end;
    })
    .reduce((s, t) => s + (t.myShare || t.total || t.amount), 0);
}

function getMonthExpenses(date = new Date()) {
  return transactions
    .filter(t => {
      const d = new Date(t.date);
      return d.getMonth() === date.getMonth() && d.getFullYear() === date.getFullYear();
    })
    .reduce((s, t) => s + (t.myShare || t.total || t.amount), 0);
}

// Card totals use TOTAL amount (what you owe the bank)
function getCardTotal(cardId) {
  const cutoff = cardCutoffs[cardId];
  return transactions
    .filter(t => {
      if (t.card !== cardId) return false;
      if (cutoff && new Date(t.date + 'T00:00:00') <= new Date(cutoff)) return false;
      return true;
    })
    .reduce((s, t) => s + (t.total || t.amount), 0);
}

function getAllCardsTotal() {
  return CARDS.reduce((s, c) => s + getCardTotal(c.id), 0);
}

function getCardTransactions(cardId) {
  const cutoff = cardCutoffs[cardId];
  return transactions
    .filter(t => {
      if (t.card !== cardId) return false;
      if (cutoff && new Date(t.date + 'T00:00:00') <= new Date(cutoff)) return false;
      return true;
    })
    .sort((a,b) => new Date(b.date) - new Date(a.date));
}

// ────────────────────────────────────────────────────────────────────────────
// ACTIONS
// ────────────────────────────────────────────────────────────────────────────

function toggleTheme() {
  theme = theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', theme);
  document.body.className = theme;
  render();
}

function goTab(tab) {
  state.tab = tab;
  ['home','finsights','expenses','subs'].forEach(t => {
    document.getElementById('panel-' + t).style.display = state.tab === t ? 'block' : 'none';
    const btn = document.getElementById('tab-' + t);
    if (btn) btn.className = 'tab-btn' + (state.tab === t ? ' active' : '');
  });
  render();
  if (tab === 'finsights') setTimeout(() => updateCharts(), 100);
}

function openModal(id) {
  const el = document.getElementById('modal-' + id);
  el.classList.add('open');
  if (id === 'addTx') {
    document.getElementById('txDate').valueAsDate = new Date();
    renderCategoryGrid();
    renderCardGrid();
    setSplitType('personal', document.querySelector('#modal-addTx [data-type="personal"]'));
  }
  if (id === 'addCat') renderEmojiGrid();
}

function closeModal(id) {
  document.getElementById('modal-' + id).classList.remove('open');
}

function renderCategoryGrid() {
  const grid = document.getElementById('catGrid');
  const cats = getCategories();
  grid.innerHTML = cats.map((cat, i) => `
    <button type="button" class="cat-btn ${i === 0 ? 'selected' : ''}" onclick="selectCategory('${esc(cat.name)}', this)">
      ${cat.emoji} ${esc(cat.name)}
    </button>
  `).join('') + `
    <button type="button" class="cat-btn" onclick="openModal('addCat')">➕ Add</button>
  `;
  document.getElementById('txCat').value = cats[0].name;
}

function selectCategory(name, btn) {
  document.querySelectorAll('#catGrid .cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('txCat').value = name;
}

function renderCardGrid() {
  const grid = document.getElementById('cardGrid');
  const opts = [...CARDS, { id: 'cash', name: 'Cash / Other' }];
  grid.innerHTML = opts.map((c, i) => `
    <button type="button" class="cat-btn ${i === 0 ? 'selected' : ''}" onclick="selectCard('${c.id}', this)">
      ${esc(c.name)}
    </button>
  `).join('');
  document.getElementById('txCard').value = opts[0].id;
}

function selectCard(id, btn) {
  document.querySelectorAll('#cardGrid .cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('txCard').value = id;
}

function setSplitType(type, btn) {
  document.querySelectorAll('#modal-addTx .toggle-pair .cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('txSplitType').value = type;
  document.getElementById('shareGroup').style.display = type === 'group' ? 'block' : 'none';
  if (type === 'personal') {
    document.getElementById('txShare').value = '';
  }
}

function syncShare() {
  // If personal, auto-sync share with total
  if (document.getElementById('txSplitType').value === 'personal') {
    document.getElementById('txShare').value = document.getElementById('txTotal').value;
  }
}

function renderEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = EMOJI_OPTIONS.map((emoji, i) => `
    <button type="button" class="cat-btn ${i === 0 ? 'selected' : ''}" onclick="selectEmoji('${emoji}', this)" style="font-size:20px;">
      ${emoji}
    </button>
  `).join('');
  document.getElementById('catEmoji').value = EMOJI_OPTIONS[0];
}

function selectEmoji(emoji, btn) {
  document.querySelectorAll('#emojiGrid .cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('catEmoji').value = emoji;
}

function saveCategory(e) {
  e.preventDefault();
  const name = document.getElementById('catName').value.trim();
  const emoji = document.getElementById('catEmoji').value;
  if (!name) return;
  customCategories.push({ name, emoji });
  localStorage.setItem('customCategories', JSON.stringify(customCategories));
  closeModal('addCat');
  document.querySelector('#modal-addCat form').reset();
  renderCategoryGrid();
  showToast('✓ Category "' + name + '" added');
}

function saveTransaction(e) {
  e.preventDefault();
  const total = parseFloat(document.getElementById('txTotal').value);
  const splitType = document.getElementById('txSplitType').value;
  const myShare = splitType === 'group'
    ? parseFloat(document.getElementById('txShare').value || total)
    : total;

  const tx = {
    id: Date.now().toString(),
    category: document.getElementById('txCat').value,
    name: document.getElementById('txName').value,
    total: total,
    myShare: myShare,
    splitType: splitType,
    card: document.getElementById('txCard').value,
    date: document.getElementById('txDate').value,
    notes: document.getElementById('txNotes').value,
  };
  
  transactions.push(tx);
  localStorage.setItem('transactions', JSON.stringify(transactions));
  closeModal('addTx');
  document.querySelector('#modal-addTx form').reset();
  showToast('✓ Logged ' + fmt(myShare));
  render();
}

function showToast(msg) {
  clearTimeout(toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

function deleteTransaction(id) {
  if (!confirm('Delete this expense?')) return;
  transactions = transactions.filter(t => t.id !== id);
  localStorage.setItem('transactions', JSON.stringify(transactions));
  render();
}

function toggleDamageView() {
  state.damageHidden = !state.damageHidden;
  render();
}

function editBiWeeklyBudget() {
  const newVal = prompt('Set your bi-weekly budget (₱):', biWeeklyBudget);
  if (newVal && !isNaN(parseFloat(newVal))) {
    biWeeklyBudget = parseFloat(newVal);
    localStorage.setItem('biWeeklyBudget', biWeeklyBudget);
    render();
    showToast('✓ Budget updated');
  }
}

function toggleCardExpand(cardId) {
  state.expandedCard = state.expandedCard === cardId ? null : cardId;
  render();
}

function toggleMonthExpand(key) {
  state.expandedMonths[key] = !state.expandedMonths[key];
  render();
}

function markCardPaid(cardId, e) {
  e.stopPropagation();
  const card = CARDS.find(c => c.id === cardId);
  if (!confirm(`Mark ${card.name} as paid? This will clear its expense log (existing transactions remain in your overall history).`)) return;
  cardCutoffs[cardId] = new Date().toISOString().split('T')[0];
  localStorage.setItem('cardCutoffs', JSON.stringify(cardCutoffs));
  showToast('✓ ' + card.name + ' marked as paid');
  render();
}

function exportData() {
  const data = {
    transactions, biWeeklyBudget, customCategories, cardCutoffs,
    exportDate: new Date().toISOString(),
    version: '3.0'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `spending-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  window.URL.revokeObjectURL(url);
  showToast('✓ Backup downloaded');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if (!confirm('This will replace all your current data. Continue?')) return;
        if (data.transactions) { transactions = data.transactions; localStorage.setItem('transactions', JSON.stringify(transactions)); }
        if (data.biWeeklyBudget) { biWeeklyBudget = data.biWeeklyBudget; localStorage.setItem('biWeeklyBudget', biWeeklyBudget); }
        if (data.customCategories) { customCategories = data.customCategories; localStorage.setItem('customCategories', JSON.stringify(customCategories)); }
        if (data.cardCutoffs) { cardCutoffs = data.cardCutoffs; localStorage.setItem('cardCutoffs', JSON.stringify(cardCutoffs)); }
        render();
        showToast('✓ Data restored');
      } catch (err) {
        showToast('✗ Invalid backup file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function setFinsightsMonth(key) {
  state.selectedFinsightsMonth = key;
  render();
  setTimeout(() => updateCharts(), 100);
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER FINSIGHTS — with monthly cards
// ────────────────────────────────────────────────────────────────────────────

function renderFinsights() {
  // Build month list from transactions
  const monthSet = new Set();
  transactions.forEach(t => {
    const d = new Date(t.date);
    monthSet.add(`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`);
  });
  
  // Always include current month
  const now = new Date();
  monthSet.add(`${now.getFullYear()}-${String(now.getMonth()).padStart(2,'0')}`);
  
  const months = [...monthSet].sort().reverse();
  const selectedKey = state.selectedFinsightsMonth || months[0];
  const [selYear, selMonth] = selectedKey.split('-').map(Number);
  const selDate = new Date(selYear, selMonth, 1);

  const txInMonth = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === selMonth && d.getFullYear() === selYear;
  });

  const byCategory = {};
  txInMonth.forEach(t => {
    const share = t.myShare || t.amount;
    byCategory[t.category] = (byCategory[t.category] || 0) + share;
  });

  const catArray = Object.entries(byCategory)
    .map(([name, amount]) => ({ name, amount }))
    .sort((a, b) => b.amount - a.amount);
  const total = catArray.reduce((s, c) => s + c.amount, 0);

  const monthCardsHtml = months.map(key => {
    const [y, m] = key.split('-').map(Number);
    const d = new Date(y, m, 1);
    const monthTotal = transactions
      .filter(t => {
        const td = new Date(t.date);
        return td.getMonth() === m && td.getFullYear() === y;
      })
      .reduce((s, t) => s + (t.myShare || t.amount), 0);
    const isSelected = key === selectedKey;
    return `
      <button onclick="setFinsightsMonth('${key}')" style="flex:none;padding:12px 16px;border-radius:16px;border:1px solid ${isSelected ? 'transparent' : 'var(--input-border)'};background:${isSelected ? 'linear-gradient(135deg,#ff9a8b,#ffc3a0)' : 'var(--input-bg)'};color:${isSelected ? '#fff' : 'var(--heading)'};cursor:pointer;text-align:left;min-width:120px;">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.5px;opacity:0.8;">${d.toLocaleDateString('en-US', {month:'short', year:'numeric'}).toUpperCase()}</div>
        <div class="num" style="margin-top:2px;font-weight:700;font-size:16px;">${fmt(monthTotal)}</div>
      </button>
    `;
  }).join('');

  const legendHtml = catArray.map((c, i) => {
    const color = TILE_COLORS[i % TILE_COLORS.length];
    const pct = total > 0 ? ((c.amount / total) * 100).toFixed(0) : 0;
    return `<div style="display:flex;align-items:center;gap:11px;padding:9px 10px;">
      <span style="flex:none;width:11px;height:11px;border-radius:50%;background:${color};"></span>
      <span style="flex:1;font-size:13px;font-weight:600;color:var(--text);">${esc(c.name)}</span>
      <span style="font-size:12px;color:var(--muted);">${pct}%</span>
      <span class="num" style="font-weight:600;font-size:15px;color:var(--heading);min-width:64px;text-align:right;">${fmt(c.amount)}</span>
    </div>`;
  }).join('');

  let donutStyle = 'conic-gradient(#ccc)';
  if (total > 0) {
    const stops = catArray.map((c, i) => {
      const color = TILE_COLORS[i % TILE_COLORS.length];
      const start = (catArray.slice(0, i).reduce((s, x) => s + x.amount, 0) / total) * 360;
      const end = ((catArray.slice(0, i + 1).reduce((s, x) => s + x.amount, 0)) / total) * 360;
      return `${color} ${start.toFixed(2)}deg ${end.toFixed(2)}deg`;
    }).join(', ');
    donutStyle = `conic-gradient(from -90deg, ${stops})`;
  }

  document.getElementById('panel-finsights').innerHTML = `
    <h1 style="margin:60px 0 0;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:38px;line-height:1;color:var(--heading);">Finsights</h1>

    <div style="margin-top:18px;display:flex;gap:10px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none;">
      ${monthCardsHtml}
    </div>

    <div style="margin-top:8px;padding:20px;border-radius:26px;background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.2);border:1px solid var(--glass-border);">
      <div class="metric-label">Total Spent · ${selDate.toLocaleDateString('en-US', {year:'numeric', month:'long'})}</div>
      <div class="num" style="margin-top:6px;font-weight:600;font-size:38px;color:var(--heading);">${fmt(total)}</div>
    </div>

    <div style="margin-top:14px;padding:20px;border-radius:26px;background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.2);border:1px solid var(--glass-border);">
      <h3 style="margin:0 0 16px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:18px;color:var(--heading);">Where it went</h3>
      <div style="display:flex;justify-content:center;margin-bottom:20px;">
        <div style="position:relative;width:150px;height:150px;border-radius:50%;background:${donutStyle};">
          <div style="position:absolute;inset:22px;border-radius:50%;background:var(--card-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <div style="font-size:10px;color:var(--muted);font-weight:600;">Total</div>
            <div class="num" style="font-weight:600;font-size:22px;color:var(--heading);">${fmt(total)}</div>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;">${legendHtml || '<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px;">No data for this month</div>'}</div>
    </div>

    <div style="margin-top:14px;padding:20px;border-radius:26px;background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.2);border:1px solid var(--glass-border);">
      <h3 style="margin:0 0 14px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:18px;color:var(--heading);">6-month trend</h3>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <div style="margin-top:14px;padding:20px;border-radius:26px;background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.2);border:1px solid var(--glass-border);margin-bottom:120px;">
      <h3 style="margin:0 0 8px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:18px;color:var(--heading);">Data Backup</h3>
      <p style="margin:0 0 14px;font-size:12px;color:var(--muted);">Your data lives only on this device. Export regularly to keep a backup safe.</p>
      <button onclick="exportData()" style="width:100%;padding:13px;background:linear-gradient(135deg,#b8f3e6,#a1e3ff);color:#2b2733;border:none;border-radius:14px;font-weight:700;cursor:pointer;font-size:13px;margin-bottom:10px;">📥 Export Backup</button>
      <button onclick="importData()" style="width:100%;padding:13px;background:var(--input-bg);color:var(--heading);border:1px solid var(--input-border);border-radius:14px;font-weight:600;cursor:pointer;font-size:13px;">📤 Restore from Backup</button>
    </div>
  `;
}

  if (state.expandedCard) {
    const card = CARDS.find(c => c.id === state.expandedCard);
    const cardTx = getCardTransactions(state.expandedCard);
    const cardTxHtml = cardTx.length ? cardTx.map(tx => `
      <div class="tx-row">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;color:var(--heading);">${esc(tx.name || tx.category)}${tx.splitType === 'group' ? '<span class="split-badge">SPLIT</span>' : ''}</div>
          <div class="tx-meta">${esc(tx.category)} • ${new Date(tx.date).toLocaleDateString()}</div>
        </div>
        <div style="text-align:right;">
          <div class="num" style="font-weight:600;color:#e2574a;">${fmt(tx.total || tx.amount)}</div>
          ${tx.splitType === 'group' ? `<div class="num" style="font-size:10px;color:var(--muted);margin-top:2px;">My share: ${fmt(tx.myShare)}</div>` : ''}
          <button onclick="deleteTransaction('${tx.id}')" style="margin-top:2px;font-size:9px;color:#e24b4a;background:none;border:none;cursor:pointer;font-weight:600;">Delete</button>
        </div>
      </div>
    `).join('') : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px;">No transactions on this card</div>';
    
    expandedHtml = `
      <div style="margin-top:14px;padding:18px;border-radius:20px;background:var(--card-bg);backdrop-filter:blur(14px);border:1px solid var(--glass-border);">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">${card.name} · Transactions</div>
        ${cardTxHtml}
      </div>
    `;
  }

  // Monthly log
  const byMonth = {};
  transactions.forEach(t => {
    const d = new Date(t.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2, '0')}`;
    if (!byMonth[key]) byMonth[key] = { date: d, total: 0, items: [] };
    byMonth[key].total += (t.myShare || t.amount);
    byMonth[key].items.push(t);
  });

  const sortedMonths = Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0]));

  const monthsHtml = sortedMonths.map(([key, data]) => {
    const monthLabel = data.date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
    const isOpen = state.expandedMonths[key];
    const itemsHtml = isOpen ? data.items.sort((a,b) => new Date(b.date) - new Date(a.date)).map(tx => `
      <div class="tx-row">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;color:var(--heading);">${esc(tx.name || tx.category)}${tx.splitType === 'group' ? '<span class="split-badge">SPLIT</span>' : ''}</div>
          <div class="tx-meta">${esc(tx.category)} • ${new Date(tx.date).toLocaleDateString()} ${tx.card !== 'cash' ? '• ' + (CARDS.find(c=>c.id===tx.card)?.name || tx.card) : ''}</div>
        </div>
        <div style="text-align:right;">
          <div class="num" style="font-weight:600;color:#e2574a;">−${fmt(tx.myShare || tx.amount)}</div>
          ${tx.splitType === 'group' ? `<div class="num" style="font-size:10px;color:var(--muted);">Total: ${fmt(tx.total)}</div>` : ''}
          <button onclick="deleteTransaction('${tx.id}')" style="margin-top:2px;font-size:9px;color:#e24b4a;background:none;border:none;cursor:pointer;font-weight:600;">Delete</button>
        </div>
      </div>
    `).join('') : '';
    
    return `
      <div style="padding:18px 20px;border-radius:22px;background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.2);border:1px solid var(--glass-border);">
        <div class="collapsible-header" onclick="toggleMonthExpand('${key}')">
          <div>
            <div class="metric-label">${monthLabel}</div>
            <div class="num" style="font-weight:600;font-size:24px;color:var(--heading);">${fmt(data.total)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${data.items.length} expense${data.items.length === 1 ? '' : 's'}</div>
          </div>
          <div class="chevron ${isOpen ? 'open' : ''}">▶</div>
        </div>
        ${itemsHtml ? `<div style="margin-top:14px;">${itemsHtml}</div>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('panel-expenses').innerHTML = `
    <h1 style="margin:60px 0 0;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:38px;line-height:1;color:var(--heading);">Expenses</h1>

    <!-- Credit Card Section -->
    <div style="margin-top:18px;padding:20px;border-radius:24px;background:var(--glass-bg);backdrop-filter:blur(18px) saturate(1.2);border:1px solid var(--glass-border);">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <div class="metric-label">Credit Limit (Shared)</div>
        <div class="num" style="font-weight:600;font-size:14px;color:var(--muted);">${fmt(CREDIT_LIMIT)}</div>
      </div>
      <div style="margin-top:12px;height:8px;border-radius:4px;background:rgba(120,108,124,0.15);overflow:hidden;">
        <div style="height:100%;width:${limitUsedPct}%;background:linear-gradient(90deg,${limitColor},#ffc3a0);border-radius:4px;transition:width 0.3s;"></div>
      </div>
      <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
        <div class="num" style="font-size:11px;color:var(--muted);">${limitUsedPct.toFixed(0)}% used</div>
        <div class="num" style="font-weight:700;font-size:18px;color:var(--heading);">${fmt(totalCardSpent)} <span style="font-size:11px;color:var(--muted);font-weight:500;">spent</span></div>
      </div>
    </div>

    <div class="cc-row" style="margin-top:14px;">
      ${cardWidgets}
    </div>

    ${expandedHtml}

    <h3 style="margin:30px 2px 14px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:20px;color:var(--heading);">Monthly Log</h3>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:120px;">
      ${monthsHtml || '<div style="text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;background:var(--glass-bg);border-radius:20px;">No expenses logged yet.</div>'}
    </div>
  `;
}

function getOrdinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER SUBS
// ────────────────────────────────────────────────────────────────────────────

function renderSubs() {
  const subTx = transactions.filter(t => t.category === 'Subscription');
  const totalSubs = subTx.reduce((s, t) => s + (t.myShare || t.amount), 0);

  document.getElementById('panel-subs').innerHTML = `
    <h1 style="margin:60px 0 0;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:38px;line-height:1;color:var(--heading);">Subscriptions</h1>

    <div style="margin-top:16px;padding:20px;border-radius:26px;background:linear-gradient(150deg,rgba(255,154,139,0.85),rgba(255,195,160,0.85));box-shadow:0 20px 44px -24px rgba(255,140,120,0.8);">
      <div style="font-size:10px;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.9);font-weight:700;">Total Logged</div>
      <div class="num" style="margin-top:6px;font-weight:700;font-size:35px;color:#fff;">${fmt(totalSubs)}</div>
    </div>

    <h3 style="margin:24px 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:18px;color:var(--heading);">All subscriptions</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:120px;">
      ${[...subTx].sort((a,b) => new Date(b.date) - new Date(a.date)).map(tx => `
        <div style="background:var(--card-bg);backdrop-filter:blur(14px);border:1px solid var(--glass-border);border-radius:20px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;">
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:14px;color:var(--heading);">${esc(tx.name || tx.category)}</div>
            <div style="margin-top:2px;font-size:11px;color:var(--muted);">${new Date(tx.date).toLocaleDateString()}</div>
          </div>
          <div style="text-align:right;">
            <div class="num" style="font-weight:600;font-size:15px;color:#e2574a;">${fmt(tx.myShare || tx.amount)}</div>
            <button onclick="deleteTransaction('${tx.id}')" style="margin-top:4px;font-size:10px;color:#e24b4a;background:none;border:none;cursor:pointer;font-weight:600;">Delete</button>
          </div>
        </div>
      `).join('') || '<div style="text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;background:var(--glass-bg);border-radius:20px;">No subscriptions yet.<br/>Log an expense with "Subscription" category.</div>'}
    </div>
  `;
}

// ────────────────────────────────────────────────────────────────────────────
// CHARTS
// ────────────────────────────────────────────────────────────────────────────

function updateCharts() {
  const ctx = document.getElementById('trendChart');
  if (!ctx) return;

  const months = [];
  const data = [];
  const now = new Date();

  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toLocaleDateString('en-US', {month:'short'}));
    const spending = transactions
      .filter(t => {
        const td = new Date(t.date);
        return td.getMonth() === d.getMonth() && td.getFullYear() === d.getFullYear();
      })
      .reduce((s, t) => s + (t.myShare || t.amount), 0);
    data.push(spending);
  }

  if (chartCache.trend) chartCache.trend.destroy();
  const textColor = theme === 'dark' ? '#b8b0c0' : '#4a4453';

  chartCache.trend = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months,
      datasets: [{
        data: data,
        borderColor: '#ff9a8b',
        backgroundColor: 'rgba(255,154,139,0.08)',
        borderWidth: 2,
        tension: 0.4,
        fill: true,
        pointBackgroundColor: '#ff9a8b',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { color: textColor, font: { family: 'Google Sans, system-ui, sans-serif' } } },
        x: { ticks: { color: textColor, font: { family: 'Google Sans, system-ui, sans-serif' } } }
      }
    }
  });
}

// ────────────────────────────────────────────────────────────────────────────
// MAIN
// ────────────────────────────────────────────────────────────────────────────

function render() {
  if (state.tab === 'home') renderHome();
  else if (state.tab === 'finsights') renderFinsights();
  else if (state.tab === 'expenses') renderExpenses();
  else if (state.tab === 'subs') renderSubs();
}

// Init
document.body.className = theme;
document.getElementById('txDate').valueAsDate = new Date();
render();
</script>

</body>
</html>
